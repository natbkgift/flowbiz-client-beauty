# FlowBiz Beauty Client Nginx Configuration
# Reverse proxies to Node.js Web Server (port 8104) and API Server (port 8103)

upstream beauty_api_backend {
    server 127.0.0.1:8103;
}

upstream beauty_web_backend {
    server 127.0.0.1:8104;
}

# HTTP server (Temporary/Initial setup for Let's Encrypt validation)
server {
    listen 80;
    listen [::]:80;
    server_name beauty.flowbiz.cloud;

    # Logging
    access_log /var/log/nginx/flowbiz-client-beauty-access.log;
    error_log /var/log/nginx/flowbiz-client-beauty-error.log warn;

    server_tokens off;
    client_max_body_size 10M;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy API requests (strip /api prefix)
    location /api/ {
        proxy_pass http://beauty_api_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy to Node.js web server for frontend and public pages
    location / {
        proxy_pass http://beauty_web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

